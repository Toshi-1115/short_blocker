<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 280px;
      font-family: "Segoe UI", "Hiragino Sans", sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      padding: 16px;
    }

    h1 {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 14px;
      color: #fff;
      text-align: center;
    }

    .site-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid #2a2a4a;
    }

    .site-row:last-child {
      border-bottom: none;
    }

    .site-info {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .site-name {
      font-size: 14px;
      font-weight: 500;
    }

    .site-count {
      font-size: 11px;
      color: #888;
    }

    /* トグルスイッチ */
    .toggle {
      position: relative;
      width: 42px;
      height: 24px;
    }

    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      inset: 0;
      background: #444;
      border-radius: 24px;
      transition: background 0.2s;
    }

    .slider::before {
      content: "";
      position: absolute;
      width: 18px;
      height: 18px;
      left: 3px;
      bottom: 3px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s;
    }

    input:checked + .slider {
      background: #e53935;
    }

    input:checked + .slider::before {
      transform: translateX(18px);
    }

    .stats {
      margin-top: 14px;
      padding-top: 10px;
      border-top: 1px solid #2a2a4a;
      text-align: center;
    }

    .stats-total {
      font-size: 24px;
      font-weight: 700;
      color: #e53935;
    }

    .stats-label {
      font-size: 11px;
      color: #888;
      margin-top: 2px;
    }
  </style>
</head>
<body>
  <h1>Short Blocker</h1>

  <div class="site-row">
    <div class="site-info">
      <span class="site-name">YouTube Shorts</span>
      <span class="site-count" id="youtube-count">0 件ブロック</span>
    </div>
    <label class="toggle">
      <input type="checkbox" id="youtube-toggle" checked>
      <span class="slider"></span>
    </label>
  </div>

  <div class="site-row">
    <div class="site-info">
      <span class="site-name">X ショート動画</span>
      <span class="site-count" id="x-count">0 件ブロック</span>
    </div>
    <label class="toggle">
      <input type="checkbox" id="x-toggle" checked>
      <span class="slider"></span>
    </label>
  </div>

  <div class="stats">
    <div class="stats-total" id="total-count">0</div>
    <div class="stats-label">合計ブロック数</div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
